# Codemagic — ふたりスパイク（ウィジェットpush検証）のネイティブiOSビルド。
# あなたの既存の流れ（GitHubへpush → Codemagicが自動ビルド → TestFlight）に乗せる用。
# Flutterではなくネイティブ(Swift)プロジェクトだが、Codemagicはネイティブも同じように扱える。
#
# ▼ Codemagicで一度だけやる準備（UI操作）:
#   1. このリポジトリを Codemagic に接続（Add application → GitHub → このrepo）
#   2. Team/App の Environment variables に、暗号化ONで1つだけ追加:
#        名前 : APP_STORE_CONNECT_PRIVATE_KEY
#        値  : ios/AuthKey_354W8MWK94.p8 の中身を丸ごと貼り付け（BEGIN〜END含む全部）
#        グループ: appstore
#   （KEY_IDとISSUER_IDは下に直書きしてあるので追加不要）
#   3. Start new build → workflow「futari-spike」を実行

workflows:
  futari-spike:
    name: ふたりスパイク (widget push)
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      groups:
        - appstore            # APP_STORE_CONNECT_PRIVATE_KEY を入れたグループ名
      vars:
        APP_STORE_CONNECT_ISSUER_ID: "d21f693e-10eb-4b81-b282-ae01de62ce43"
        APP_STORE_CONNECT_KEY_IDENTIFIER: "354W8MWK94"
        BUNDLE_ID: "com.ssswataru.futarispike"
        WIDGET_BUNDLE_ID: "com.ssswataru.futarispike.widget"
      xcode: latest
    scripts:
      - name: XcodeGenでプロジェクト生成＋ビルド番号設定
        script: |
          brew install xcodegen
          cd ios && xcodegen
          # CFBundleVersion を Codemagic の連番($BUILD_NUMBER)に上書き。
          # 「番号は前回より大きく」というApp Store Connectの要件を満たす。
          # App本体とウィジェットは同じ番号にする必要がある（Appleの検証で一致必須）。
          setver() { /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $1" "$2" 2>/dev/null || /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $1" "$2"; }
          setver "$BUILD_NUMBER" App/Info.plist
          setver "$BUILD_NUMBER" Widget/Info.plist
      - name: 署名ファイルを取得（証明書・プロファイルを自動発行）
        script: |
          # 既存の配布証明書はCodemagicに秘密鍵が無く使えないため、
          # 環境変数 CERTIFICATE_PRIVATE_KEY の鍵に紐づく証明書を --create で新規発行する。
          # 同じ鍵を使う限り証明書は再利用され、毎回増えることはない。
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
          app-store-connect fetch-signing-files "$WIDGET_BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: アーカイブ＆.ipa作成
        script: |
          cd ios
          xcode-project build-ipa \
            --project "FutariSpike.xcodeproj" \
            --scheme "FutariSpike"
    artifacts:
      - ios/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        # 内部テスターはアップロード済みビルドへ自動でアクセスできるため beta_groups は不要。
        # （内部グループはビルドへ手動割り当て不可＝指定するとエラーになる）
        # 外部テスト配信が必要になったら external の beta_groups をここに追加する。
